<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>האתר שלי</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
.bunny-container {
  text-align: center;
  margin-top: 80px;
}

.bunny {
  width: 200px;
}

.heart {
  position: fixed;
  top: -10px;
  color: #ff4fa3;
  font-size: 20px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}


    body {
  font-family: 'Quicksand', sans-serif;
  background-color: #ffd6e7;

  background-image: url("https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Emoji_u2764.svg/32px-Emoji_u2764.svg.png");
  background-repeat: repeat;
  background-size: 40px;
}

    .page-title {
      font-size: 4rem;
      font-weight: 700;
      text-align: center;
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .about-text {
  text-align: center;
  font-size: 1.2rem;
    }

    .location-box {
      background-color: #d9f2fb;
      border: 1px solid #9ed8ea;
      border-radius: 10px;
      padding: 25px;
      font-size: 1.2rem;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <h1 class="page-title">Alona Agaronov</h1>
    <hr />

    <div class="row">
   <div class="col-md-12 mb-4 text-center">
        <h2 class="section-title">💗💗💗💗</h2>
        <p class="about-text">
         Hey!! Welcome to my website <br><br>
         My name is Alona Agaronov and I study CS in HIT
        </p>
      </div>

        </ul>
      </div>
    </div>

    
    </div>
  </div>
<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = Math.random() * 3 + 2 + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>
<div class="bunny-container">
  <img src="bunny.jpg">
</div>
</body>

</html>
